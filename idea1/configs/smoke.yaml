defaults: base.yaml
lwe:
  n: 16
  m: 64
  q: 257
  h: 3
  secret_type: binary
  noise_type: uniform_small
  noise_bound: 1
train:
  batch_size: 8
  steps: 2
  lr: 0.0003
  weight_decay: 0.0001
  log_every: 1
  eval_every: 2
eval:
  batches: 1
  top_k: 6
attack:
  use_verification: true
  candidate_k: 6
model:
  name: simple_cnn
  in_channels: 8
  hidden_dim: 32

